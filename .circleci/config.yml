version: 2.1

jobs:
  build_and_deploy:
    docker:
      - image: cimg/node:22.17

    steps:
      - checkout
      - run: npm install
      - run: npm run build

      - add_ssh_keys:
          fingerprints:
            - "SHA256:NBbJ86F9P1DNkhlO3OP5E+wLu0uFnm7i1JHGgGWorb0"

      - run:
          name: Trust server
          command: |
            mkdir -p ~/.ssh
            ssh-keyscan -H xiangqi-host-on-alibaba-cloud >> ~/.ssh/known_hosts

      
      - run:
          name: Install rsync
          command: |
            sudo apt-get update
            sudo apt-get install -y rsync

      - run:
          name: Deploy
          command: |
            rsync -az --delete dist/ root@8.210.70.140:/var/www/xiangqi/

workflows:
  deploy:
    jobs:
      - build_and_deploy
